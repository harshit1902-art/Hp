<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.container{
text-align:center;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
}

h1{
color:#ff4d6d;
font-size:40px;
}

p{
font-size:18px;
color:#555;
margin-bottom:20px;
}

button{
border:none;
padding:12px 25px;
margin:10px;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:#ccc;
}

button:hover{
transform:scale(1.1);
}

.hearts{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0); opacity:1;}
100%{transform:translateY(-800px); opacity:0;}
}

#message{
margin-top:20px;
font-size:18px;
color:#ff4d6d;
font-weight:500;
}

/* Hide youtube video */
#bgmusic{
position:absolute;
width:0;
height:0;
border:0;
}

</style>
</head>

<body>

<!-- Background Music (Hidden YouTube Player) -->
<iframe id="bgmusic"
src="https://www.youtube.com/embed/rtOvBOTyX00?start=65&autoplay=1&loop=1&playlist=rtOvBOTyX00"
allow="autoplay">
</iframe>

<div class="container">

<h1>I'm Sorry ❤️</h1>

<p>
I know I made a mistake and I truly regret it.  
You mean so much to me and I hate seeing you upset because of me.
</p>

<p>Will you forgive me?</p>

<button class="yes" onclick="forgive()">Yes 💕</button>
<button class="no" id="noBtn" onmouseover="moveButton()">No 😤</button>

<div id="message"></div>

</div>

<script>

function forgive(){
document.getElementById("message").innerHTML =
"Thank you for forgiving me ❤️ I promise I'll do better!";
createHearts();
}

function moveButton(){

let button = document.getElementById("noBtn");

let x = Math.random() * (window.innerWidth - 100);
let y = Math.random() * (window.innerHeight - 50);

button.style.position = "absolute";
button.style.left = x + "px";
button.style.top = y + "px";

}

function createHearts(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="hearts";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
